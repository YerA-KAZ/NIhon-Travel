<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Nihon Travel</title>
  <link rel="stylesheet" href="/css/profile.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="/js/i18n.js" defer></script>
</head>
<body>

<div class="profile-layout">
  <!-- ══════════════════ SIDEBAR ══════════════════ -->
  <aside class="profile-sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo">
        <span class="logo-kanji">日</span>
        Nihon Travel
      </a>
      <div class="sidebar-avatar-wrap" id="sidebar-user-info">
        <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>

<nav class="sidebar-nav">
  <div class="sidebar-nav-item active" onclick="showTab('overview', event)">
    <span class="nav-icon"><i class="fa-solid fa-house"></i></span> <span data-i18n="profile.nav.overview">Overview</span>
  </div>
  <div class="sidebar-nav-item" onclick="showTab('favorites', event)">
    <span class="nav-icon"><i class="fa-solid fa-heart"></i></span> <span data-i18n="profile.nav.favorites">Favorites</span>
  </div>
  <div class="sidebar-nav-item" onclick="showTab('history', event)">
    <span class="nav-icon"><i class="fa-regular fa-clock"></i></span> <span data-i18n="profile.nav.history">Viewed History</span>
  </div>
  <div class="sidebar-nav-item" onclick="showTab('messages', event)">
    <span class="nav-icon"><i class="fa-solid fa-envelope"></i></span> <span data-i18n="profile.nav.messages">My Messages</span>
  </div>
  <div class="sidebar-nav-item" onclick="showTab('settings', event)">
    <span class="nav-icon"><i class="fa-solid fa-gear"></i></span> <span data-i18n="profile.nav.settings">Settings</span>
  </div>
</nav>

    <div class="sidebar-footer">
      <button onclick="logout()" class="btn btn-danger" style="width:100%;justify-content:center;padding:0.65rem 1rem" data-i18n="profile.signout">
        Sign Out
      </button>
    </div>  
  </aside>

  <!-- ══════════════════ MAIN ══════════════════ -->
  <main class="profile-main">
    <div class="profile-topbar">
      <h1 class="topbar-title" id="page-title" data-i18n="profile.nav.overview">Overview</h1>
      <div class="topbar-actions">
        <div class="lang-switcher" style="margin-right:0.5rem">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="kz">KZ</button>
        </div>
        <a href="/" class="btn btn-outline" data-i18n="profile.back">← Back to Site</a>
      </div>
    </div>

    <div class="profile-content">

      <!-- Overview Tab -->
      <div class="tab-panel active" id="tab-overview">
        <div class="profile-overview-grid">
          <div class="overview-card">
            <div class="overview-icon"><i class="fa-solid fa-heart"></i></div>
            <div>
              <span class="overview-num" id="fav-count">—</span>
              <span class="overview-label" data-i18n="profile.overview.favs">Saved Favorites</span>
            </div>
          </div>
          <div class="overview-card">
            <div class="overview-icon"><i class="fa-regular fa-eye"></i></div>
            <div>
              <span class="overview-num" id="hist-count">—</span>
              <span class="overview-label" data-i18n="profile.overview.hist">Destinations Viewed</span>
            </div>
          </div>
          <div class="overview-card">
            <div class="overview-icon"><i class="fa-solid fa-envelope"></i></div>
            <div>
              <span class="overview-num" id="msg-count">—</span>
              <span class="overview-label" data-i18n="profile.overview.msgs">Messages Sent</span>
            </div>
          </div>
        </div>

        <div style="background:var(--white);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-soft);max-width:600px">
          <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:1.5rem" data-i18n="profile.overview.account">Account Details</h3>
          <div id="account-details" style="display:flex;flex-direction:column;gap:1rem">
            <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
          </div>
        </div>
      </div>

      <!-- Favorites Tab -->
      <div class="tab-panel" id="tab-favorites">
        <div id="favorites-content">
          <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>

      <!-- History Tab -->
      <div class="tab-panel" id="tab-history">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
          <h3 style="font-family:var(--font-serif);font-size:1.2rem" data-i18n="profile.history.title">Destinations You've Viewed</h3>
          <button onclick="clearHistory()" class="btn btn-danger" style="padding:0.5rem 1rem;font-size:0.78rem" data-i18n="profile.history.clearAll">Clear All</button>
        </div>
        <div id="history-content">
          <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>

      <!-- Messages Tab -->
      <div class="tab-panel" id="tab-messages">
        <div id="messages-content">
          <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="tab-panel" id="tab-settings">
        <div style="display:grid;gap:2rem;max-width:600px">
          <div class="profile-form-card">
            <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:1.5rem" data-i18n="profile.settings.editTitle">Edit Profile</h3>
            <form id="profile-form" onsubmit="updateProfile(event)">
              <div class="form-group">
                <label data-i18n="profile.settings.lbl.displayName">Display Name</label>
                <input type="text" name="name" id="profile-name-input" placeholder="Your name" data-i18n-ph="profile.settings.ph.displayName">
              </div>
              <div class="form-group">
                <label data-i18n="profile.settings.lbl.avatarUrl">Avatar URL</label>
                <input type="url" name="avatar" id="profile-avatar-input" placeholder="https://..." data-i18n-ph="profile.settings.ph.avatarUrl">
              </div>
              <button type="submit" class="btn btn-primary" data-i18n="profile.settings.btn.save">Save Changes</button>
            </form>
          </div>

          <div class="profile-form-card">
            <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:1.5rem" data-i18n="profile.settings.changePasswordTitle">Change Password</h3>
            <form id="password-form" onsubmit="changePassword(event)">
              <div class="form-group">
                <label data-i18n="profile.settings.lbl.currentPassword">Current Password</label>
                <input type="password" name="current_password" placeholder="••••••••" required>
              </div>
              <div class="form-group">
                <label data-i18n="profile.settings.lbl.newPassword">New Password</label>
                <input type="password" name="new_password" placeholder="Min 6 characters" data-i18n-ph="profile.settings.ph.newPassword" required>
              </div>
              <div class="form-group">
                <label data-i18n="profile.settings.lbl.confirmNewPassword">Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat new password" data-i18n-ph="profile.settings.ph.confirmNewPassword" required>
              </div>
              <button type="submit" class="btn btn-primary" data-i18n="profile.settings.btn.updatePassword">Update Password</button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
const API_BASE = '/api';

let currentUser = null;
let token = null;

function t(key, fallback) {
  return window.NihonI18n?.t ? window.NihonI18n.t(key, fallback) : fallback;
}

function locale() {
  return window.NihonI18n?.getLocale ? window.NihonI18n.getLocale() : 'en-US';
}

function formatDate(value, options = { year: 'numeric', month: 'long', day: 'numeric' }) {
  return new Date(value).toLocaleDateString(locale(), options);
}

function refreshI18n() {
  if (!window.NihonI18n) return;
  window.NihonI18n.cacheElements();
  window.NihonI18n.refreshLang();
}

function translateCategory(category) {
  if (!category) return t('dest.dynamic.destination', 'Destination');
  return t(`dest.cat.${category}`, category);
}

function translateRole(role) {
  return role === 'admin'
    ? t('profile.role.admin', 'Admin')
    : t('profile.role.user', 'User');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  token = localStorage.getItem('jt_token');
  const userData = localStorage.getItem('jt_user');

  if (!token || !userData) {
    window.location.href = '/?login=true';
    return;
  }

  currentUser = JSON.parse(userData);
  renderSidebar();
  loadOverviewData();
});

document.addEventListener('nihon:langchange', () => {
  if (!currentUser) return;
  renderSidebar();
  renderAccountDetails();

  if (document.getElementById('tab-favorites').classList.contains('active')) loadFavorites();
  if (document.getElementById('tab-history').classList.contains('active')) loadHistory();
  if (document.getElementById('tab-messages').classList.contains('active')) loadMessages();
});

function renderSidebar() {
  const avatar = currentUser.avatar || 
    `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.name)}&background=c0392b&color=fff&size=160`;
  
  document.getElementById('sidebar-user-info').innerHTML = `
    <img src="${avatar}" alt="${currentUser.name}" class="sidebar-avatar">
    <p class="sidebar-name">${currentUser.name}</p>
    <p class="sidebar-email">${currentUser.email}</p>
    ${currentUser.role === 'admin' ? `<span class="sidebar-badge">${t('profile.role.admin', 'Admin')}</span>` : ''}
  `;

  // Pre-fill settings
  document.getElementById('profile-name-input').value = currentUser.name;
  if (currentUser.avatar) document.getElementById('profile-avatar-input').value = currentUser.avatar;
}

function renderAccountDetails() {
  if (!currentUser) return;

  document.getElementById('account-details').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--paper-dark)">
      <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">${t('profile.account.name', 'Name')}</span>
      <span style="font-size:0.9rem;font-weight:500">${currentUser.name}</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--paper-dark)">
      <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">${t('profile.account.email', 'Email')}</span>
      <span style="font-size:0.9rem">${currentUser.email}</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--paper-dark)">
      <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">${t('profile.account.role', 'Role')}</span>
      <span style="font-size:0.9rem;text-transform:capitalize">${translateRole(currentUser.role || 'user')}</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:0.75rem 0">
      <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">${t('profile.account.memberSince', 'Member Since')}</span>
      <span style="font-size:0.9rem">${formatDate(currentUser.created_at)}</span>
    </div>
  `;
}

async function apiCall(endpoint, options = {}) {
  const config = {
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    ...options
  };
  if (config.body && typeof config.body === 'object') {
    config.body = JSON.stringify(config.body);
  }
  const res = await fetch(`${API_BASE}${endpoint}`, config);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function loadOverviewData() {
  try {
    const [favData, histData, msgData] = await Promise.all([
      apiCall('/favorites').catch(() => ({ favorites: [] })),
      apiCall('/history').catch(() => ({ history: [] })),
      apiCall('/messages/my').catch(() => ({ messages: [] }))
    ]);

    document.getElementById('fav-count').textContent = favData.favorites.length;
    document.getElementById('hist-count').textContent = histData.history.length;
    document.getElementById('msg-count').textContent = msgData.messages.length;

    renderAccountDetails();
  } catch (err) {
    console.error('Overview error:', err);
  }
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav-item').forEach(i => i.classList.remove('active'));


  document.getElementById(`tab-${name}`).classList.add('active');
  const el = document.querySelector(`.sidebar-nav-item[onclick*="'${name}'"]`);
  if (el) el.classList.add('active');

  const titleKeyByTab = {
    overview: 'profile.nav.overview',
    favorites: 'profile.nav.favorites',
    history: 'profile.nav.history',
    messages: 'profile.nav.messages',
    settings: 'profile.nav.settings'
  };
  const pageTitle = document.getElementById('page-title');
  pageTitle.setAttribute('data-i18n', titleKeyByTab[name] || 'profile.nav.overview');
  refreshI18n();

  if (name === 'overview') renderAccountDetails();
  if (name === 'favorites') loadFavorites();
  if (name === 'history') loadHistory();
  if (name === 'messages') loadMessages();
}

// ── FAVORITES ──
async function loadFavorites() {
  const container = document.getElementById('favorites-content');
  container.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  
  try {
    const data = await apiCall('/favorites');
    
    if (!data.favorites.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fa-regular fa-heart"></i></div>
        <h3 class="empty-title" data-i18n="profile.favorites.empty.title">No favorites yet</h3>
        <p class="empty-desc" data-i18n="profile.favorites.empty.desc">Browse destinations and tap <i class="fa-solid fa-heart"></i> to save them here</p>
        <br><a href="/#destinations" class="btn btn-primary" style="margin-top:1rem" data-i18n="profile.favorites.empty.explore">Explore Destinations</a>
      </div>`;
      refreshI18n();
      return;
    }

    container.innerHTML = `<div class="items-grid">${data.favorites.map(dest => `
      <div class="item-card">
        <img class="item-img" src="${dest.image_url || 'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600'}" alt="${dest.name}">
        <div class="item-body">
          <p class="item-category">${translateCategory(dest.category)}</p>
          <h4 class="item-name">${dest.name}</h4>
          <p class="item-location"><i class="fa-solid fa-location-dot"></i> ${dest.location || t('dest.dynamic.japan', 'Japan')}</p>
          <p class="item-time"><span data-i18n="profile.favorites.item.savedLabel">Saved</span> ${formatDate(dest.created_at)}</p>
          <button class="remove-fav-btn" onclick="removeFavorite(${dest.id})"><i class="fa-solid fa-xmark"></i> <span data-i18n="profile.favorites.remove">Remove</span></button>
        </div>
      </div>
    `).join('')}</div>`;
    refreshI18n();
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>${t('profile.error.loadFavorites', 'Error loading favorites')}: ${err.message}</p></div>`;
  }
}

async function removeFavorite(destId) {
  try {
    await apiCall(`/favorites/${destId}`, { method: 'DELETE' });
    showToast(t('profile.toast.removedFavorite', 'Removed from favorites'), 'info');
    loadFavorites();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── HISTORY ──
async function loadHistory() {
  const container = document.getElementById('history-content');
  container.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  
  try {
    const data = await apiCall('/history');
    
    if (!data.history.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fa-regular fa-clock"></i></div>
        <h3 class="empty-title" data-i18n="profile.history.empty.title">No history yet</h3>
        <p class="empty-desc" data-i18n="profile.history.empty.desc">Start exploring destinations and your history will appear here</p>
      </div>`;
      refreshI18n();
      return;
    }

    container.innerHTML = `<div class="items-grid">${data.history.map(item => `
      <div class="item-card">
        <img class="item-img" src="${item.image_url || 'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600'}" alt="${item.name}">
        <div class="item-body">
          <p class="item-category">${translateCategory(item.category)}</p>
          <h4 class="item-name">${item.name}</h4>
          <p class="item-location"><i class="fa-solid fa-location-dot"></i> ${item.location || t('dest.dynamic.japan', 'Japan')}</p>
          <p class="item-time"><span data-i18n="profile.history.item.viewedLabel">Viewed</span> ${formatDate(item.viewed_at)}</p>
        </div>
      </div>
    `).join('')}</div>`;
    refreshI18n();
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>${t('profile.error.loadHistory', 'Error loading history')}: ${err.message}</p></div>`;
  }
}

async function clearHistory() {
  if (!confirm(t('profile.confirm.clearHistory', 'Clear all viewed history?'))) return;
  try {
    await apiCall('/history', { method: 'DELETE' });
    showToast(t('profile.toast.historyCleared', 'History cleared'), 'info');
    loadHistory();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── MESSAGES ──
async function loadMessages() {
  const container = document.getElementById('messages-content');
  container.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  
  try {
    const data = await apiCall('/messages/my');
    
    if (!data.messages.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-envelope"></i></div>
        <h3 class="empty-title" data-i18n="profile.messages.empty.title">No messages yet</h3>
        <p class="empty-desc" data-i18n="profile.messages.empty.desc">Messages you send via the contact form will appear here</p>
        <br><a href="/#contact" class="btn btn-primary" style="margin-top:1rem" data-i18n="profile.messages.empty.contact">Contact Us</a>
      </div>`;
      refreshI18n();
      return;
    }

    container.innerHTML = `<div class="messages-list">${data.messages.map(msg => `
      <div class="message-card ${!msg.is_read ? 'unread' : ''}">
        <div class="message-meta">
          <span class="message-subject">${msg.subject || t('profile.messages.subject.general', 'General Inquiry')}</span>
          <span class="message-date">${formatDate(msg.created_at, { year: 'numeric', month: 'short', day: 'numeric' })}</span>
        </div>
        <p class="message-text">${msg.message}</p>
      </div>
    `).join('')}</div>`;
    refreshI18n();
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>${t('profile.error.loadMessages', 'Error loading messages')}: ${err.message}</p></div>`;
  }
}

// ── PROFILE UPDATE ──
async function updateProfile(event) {
  event.preventDefault();
  const form = document.getElementById('profile-form');
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = t('profile.toast.saving', 'Saving...');

  const name = form.querySelector('[name="name"]').value;
  const avatar = form.querySelector('[name="avatar"]').value;

  try {
    const data = await apiCall('/users/profile', {
      method: 'PUT',
      body: { name, avatar: avatar || null }
    });

    currentUser = { ...currentUser, ...data.user };
    localStorage.setItem('jt_user', JSON.stringify(currentUser));
    renderSidebar();
    renderAccountDetails();
    showToast(t('profile.toast.profileUpdated', 'Profile updated!'), 'success');
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = t('profile.settings.btn.save', 'Save Changes');
  }
}

async function changePassword(event) {
  event.preventDefault();
  const form = document.getElementById('password-form');
  const btn = form.querySelector('button[type="submit"]');
  
  const current_password = form.querySelector('[name="current_password"]').value;
  const new_password = form.querySelector('[name="new_password"]').value;
  const confirm = form.querySelector('[name="confirm_password"]').value;

  if (new_password !== confirm) {
    showToast(t('profile.toast.passwordMismatch', 'Passwords do not match'), 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = t('profile.toast.updating', 'Updating...');

  try {
    await apiCall('/users/password', {
      method: 'PUT',
      body: { current_password, new_password }
    });
    showToast(t('profile.toast.passwordUpdated', 'Password changed successfully!'), 'success');
    form.reset();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = t('profile.settings.btn.updatePassword', 'Update Password');
  }
}

function logout() {
  localStorage.removeItem('jt_token');
  localStorage.removeItem('jt_user');
  window.location.href = '/';
}

// ── TOAST ──
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const icons = {
    success: '<i class="fa-solid fa-circle-check"></i>',
    error: '<i class="fa-solid fa-circle-xmark"></i>',
    info: '<i class="fa-solid fa-circle-info"></i>'
  };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${message}</span>`;
  container.appendChild(toast);
  requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3500);
}
</script>
</body>
</html>
