<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Nihon Travel</title>
  <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div class="profile-layout">
  <!-- ══════════════════ SIDEBAR ══════════════════ -->
  <aside class="profile-sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo">
        <span class="logo-kanji">日</span>
        Nihon Travel
      </a>
      <div class="sidebar-avatar-wrap" id="sidebar-user-info">
        <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-nav-item active" onclick="showTab('overview')">
        <span class="nav-icon">🏠</span> Overview
      </div>
      <div class="sidebar-nav-item" onclick="showTab('favorites')">
        <span class="nav-icon">❤️</span> Favorites
      </div>
      <div class="sidebar-nav-item" onclick="showTab('history')">
        <span class="nav-icon">🕐</span> Viewed History
      </div>
      <div class="sidebar-nav-item" onclick="showTab('messages')">
        <span class="nav-icon">📩</span> My Messages
      </div>
      <div class="sidebar-nav-item" onclick="showTab('settings')">
        <span class="nav-icon">⚙️</span> Settings
      </div>
    </nav>

    <div class="sidebar-footer">
      <button onclick="logout()" class="btn btn-danger" style="width:100%;justify-content:center;padding:0.65rem 1rem">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ══════════════════ MAIN ══════════════════ -->
  <main class="profile-main">
    <div class="profile-topbar">
      <h1 class="topbar-title" id="page-title">Overview</h1>
      <div class="topbar-actions">
        <a href="/" class="btn btn-outline">← Back to Site</a>
      </div>
    </div>

    <div class="profile-content">

      <!-- Overview Tab -->
      <div class="tab-panel active" id="tab-overview">
        <div class="profile-overview-grid">
          <div class="overview-card">
            <div class="overview-icon">❤️</div>
            <div>
              <span class="overview-num" id="fav-count">—</span>
              <span class="overview-label">Saved Favorites</span>
            </div>
          </div>
          <div class="overview-card">
            <div class="overview-icon">👁️</div>
            <div>
              <span class="overview-num" id="hist-count">—</span>
              <span class="overview-label">Destinations Viewed</span>
            </div>
          </div>
          <div class="overview-card">
            <div class="overview-icon">📩</div>
            <div>
              <span class="overview-num" id="msg-count">—</span>
              <span class="overview-label">Messages Sent</span>
            </div>
          </div>
        </div>

        <div style="background:var(--white);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-soft);max-width:600px">
          <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:1.5rem">Account Details</h3>
          <div id="account-details" style="display:flex;flex-direction:column;gap:1rem">
            <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
          </div>
        </div>
      </div>

      <!-- Favorites Tab -->
      <div class="tab-panel" id="tab-favorites">
        <div id="favorites-content">
          <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>

      <!-- History Tab -->
      <div class="tab-panel" id="tab-history">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
          <h3 style="font-family:var(--font-serif);font-size:1.2rem">Destinations You've Viewed</h3>
          <button onclick="clearHistory()" class="btn btn-danger" style="padding:0.5rem 1rem;font-size:0.78rem">Clear All</button>
        </div>
        <div id="history-content">
          <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>

      <!-- Messages Tab -->
      <div class="tab-panel" id="tab-messages">
        <div id="messages-content">
          <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="tab-panel" id="tab-settings">
        <div style="display:grid;gap:2rem;max-width:600px">
          <div class="profile-form-card">
            <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:1.5rem">Edit Profile</h3>
            <form id="profile-form" onsubmit="updateProfile(event)">
              <div class="form-group">
                <label>Display Name</label>
                <input type="text" name="name" id="profile-name-input" placeholder="Your name">
              </div>
              <div class="form-group">
                <label>Avatar URL</label>
                <input type="url" name="avatar" id="profile-avatar-input" placeholder="https://...">
              </div>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
          </div>

          <div class="profile-form-card">
            <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:1.5rem">Change Password</h3>
            <form id="password-form" onsubmit="changePassword(event)">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" placeholder="••••••••" required>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min 6 characters" required>
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat new password" required>
              </div>
              <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
const API_BASE = '/api';

let currentUser = null;
let token = null;

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  token = localStorage.getItem('jt_token');
  const userData = localStorage.getItem('jt_user');

  if (!token || !userData) {
    window.location.href = '/?login=true';
    return;
  }

  currentUser = JSON.parse(userData);
  renderSidebar();
  loadOverviewData();
});

function renderSidebar() {
  const avatar = currentUser.avatar || 
    `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.name)}&background=c0392b&color=fff&size=160`;
  
  document.getElementById('sidebar-user-info').innerHTML = `
    <img src="${avatar}" alt="${currentUser.name}" class="sidebar-avatar">
    <p class="sidebar-name">${currentUser.name}</p>
    <p class="sidebar-email">${currentUser.email}</p>
    ${currentUser.role === 'admin' ? '<span class="sidebar-badge">Admin</span>' : ''}
  `;

  // Pre-fill settings
  document.getElementById('profile-name-input').value = currentUser.name;
  if (currentUser.avatar) document.getElementById('profile-avatar-input').value = currentUser.avatar;
}

async function apiCall(endpoint, options = {}) {
  const config = {
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    ...options
  };
  if (config.body && typeof config.body === 'object') {
    config.body = JSON.stringify(config.body);
  }
  const res = await fetch(`${API_BASE}${endpoint}`, config);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function loadOverviewData() {
  try {
    const [favData, histData, msgData] = await Promise.all([
      apiCall('/favorites').catch(() => ({ favorites: [] })),
      apiCall('/history').catch(() => ({ history: [] })),
      apiCall('/messages/my').catch(() => ({ messages: [] }))
    ]);

    document.getElementById('fav-count').textContent = favData.favorites.length;
    document.getElementById('hist-count').textContent = histData.history.length;
    document.getElementById('msg-count').textContent = msgData.messages.length;

    document.getElementById('account-details').innerHTML = `
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--paper-dark)">
        <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">Name</span>
        <span style="font-size:0.9rem;font-weight:500">${currentUser.name}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--paper-dark)">
        <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">Email</span>
        <span style="font-size:0.9rem">${currentUser.email}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--paper-dark)">
        <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">Role</span>
        <span style="font-size:0.9rem;text-transform:capitalize">${currentUser.role || 'user'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0">
        <span style="font-size:0.8rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.1em">Member Since</span>
        <span style="font-size:0.9rem">${new Date(currentUser.created_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</span>
      </div>
    `;
  } catch (err) {
    console.error('Overview error:', err);
  }
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav-item').forEach(i => i.classList.remove('active'));

  document.getElementById(`tab-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');

  const titles = { overview: 'Overview', favorites: 'My Favorites', history: 'Viewed History', messages: 'My Messages', settings: 'Settings' };
  document.getElementById('page-title').textContent = titles[name] || name;

  if (name === 'favorites') loadFavorites();
  if (name === 'history') loadHistory();
  if (name === 'messages') loadMessages();
}

// ── FAVORITES ──
async function loadFavorites() {
  const container = document.getElementById('favorites-content');
  container.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  
  try {
    const data = await apiCall('/favorites');
    
    if (!data.favorites.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🤍</div>
        <h3 class="empty-title">No favorites yet</h3>
        <p class="empty-desc">Browse destinations and tap ❤️ to save them here</p>
        <br><a href="/#destinations" class="btn btn-primary" style="margin-top:1rem">Explore Destinations</a>
      </div>`;
      return;
    }

    container.innerHTML = `<div class="items-grid">${data.favorites.map(dest => `
      <div class="item-card">
        <img class="item-img" src="${dest.image_url || 'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600'}" alt="${dest.name}">
        <div class="item-body">
          <p class="item-category">${dest.category || 'destination'}</p>
          <h4 class="item-name">${dest.name}</h4>
          <p class="item-location">📍 ${dest.location || 'Japan'}</p>
          <p class="item-time">Saved ${new Date(dest.created_at).toLocaleDateString()}</p>
          <button class="remove-fav-btn" onclick="removeFavorite(${dest.id})">Remove ✕</button>
        </div>
      </div>
    `).join('')}</div>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>Error loading favorites: ${err.message}</p></div>`;
  }
}

async function removeFavorite(destId) {
  try {
    await apiCall(`/favorites/${destId}`, { method: 'DELETE' });
    showToast('Removed from favorites', 'info');
    loadFavorites();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── HISTORY ──
async function loadHistory() {
  const container = document.getElementById('history-content');
  container.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  
  try {
    const data = await apiCall('/history');
    
    if (!data.history.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🕐</div>
        <h3 class="empty-title">No history yet</h3>
        <p class="empty-desc">Start exploring destinations and your history will appear here</p>
      </div>`;
      return;
    }

    container.innerHTML = `<div class="items-grid">${data.history.map(item => `
      <div class="item-card">
        <img class="item-img" src="${item.image_url || 'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600'}" alt="${item.name}">
        <div class="item-body">
          <p class="item-category">${item.category || 'destination'}</p>
          <h4 class="item-name">${item.name}</h4>
          <p class="item-location">📍 ${item.location || 'Japan'}</p>
          <p class="item-time">Viewed ${new Date(item.viewed_at).toLocaleDateString()}</p>
        </div>
      </div>
    `).join('')}</div>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>Error loading history: ${err.message}</p></div>`;
  }
}

async function clearHistory() {
  if (!confirm('Clear all viewed history?')) return;
  try {
    await apiCall('/history', { method: 'DELETE' });
    showToast('History cleared', 'info');
    loadHistory();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── MESSAGES ──
async function loadMessages() {
  const container = document.getElementById('messages-content');
  container.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  
  try {
    const data = await apiCall('/messages/my');
    
    if (!data.messages.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📩</div>
        <h3 class="empty-title">No messages yet</h3>
        <p class="empty-desc">Messages you send via the contact form will appear here</p>
        <br><a href="/#contact" class="btn btn-primary" style="margin-top:1rem">Contact Us</a>
      </div>`;
      return;
    }

    container.innerHTML = `<div class="messages-list">${data.messages.map(msg => `
      <div class="message-card ${!msg.is_read ? 'unread' : ''}">
        <div class="message-meta">
          <span class="message-subject">${msg.subject || 'General Inquiry'}</span>
          <span class="message-date">${new Date(msg.created_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'})}</span>
        </div>
        <p class="message-text">${msg.message}</p>
      </div>
    `).join('')}</div>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>Error loading messages: ${err.message}</p></div>`;
  }
}

// ── PROFILE UPDATE ──
async function updateProfile(event) {
  event.preventDefault();
  const form = document.getElementById('profile-form');
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const name = form.querySelector('[name="name"]').value;
  const avatar = form.querySelector('[name="avatar"]').value;

  try {
    const data = await apiCall('/users/profile', {
      method: 'PUT',
      body: { name, avatar: avatar || null }
    });

    currentUser = { ...currentUser, ...data.user };
    localStorage.setItem('jt_user', JSON.stringify(currentUser));
    renderSidebar();
    showToast('Profile updated! ✨', 'success');
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

async function changePassword(event) {
  event.preventDefault();
  const form = document.getElementById('password-form');
  const btn = form.querySelector('button[type="submit"]');
  
  const current_password = form.querySelector('[name="current_password"]').value;
  const new_password = form.querySelector('[name="new_password"]').value;
  const confirm = form.querySelector('[name="confirm_password"]').value;

  if (new_password !== confirm) {
    showToast('Passwords do not match', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  try {
    await apiCall('/users/password', {
      method: 'PUT',
      body: { current_password, new_password }
    });
    showToast('Password changed successfully!', 'success');
    form.reset();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
}

function logout() {
  localStorage.removeItem('jt_token');
  localStorage.removeItem('jt_user');
  window.location.href = '/';
}

// ── TOAST ──
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
  container.appendChild(toast);
  requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3500);
}
</script>
</body>
</html>
